- name: Common packages
  pacman:
    name:
      - nodejs-lts-fermium
      - nodejs-lts-gallium
    state: absent
  become: false

- name: Common packages
  pacman:
    name:
      # Browsers
      - chromium
      - firefox-developer-edition
      # General
      - easyeffects
      # Easy effects plugins
      - lsp-plugins-lv2
      - calf
      - deskflow
      - keepassxc
      - p7zip
      - unp
      - mpv
      - syncthing
      # Packages
      - nix
      - yay
      # Dev
      - corepack
      - kitty
      - starship
      - git
      - git-delta
      - gitg
      - docker
      - docker-compose
      - nodejs-lts-krypton
      - jdk11-openjdk
      - jdk25-openjdk
      - vivid
    state: present
  become: true

- name: Enable and/or start docker
  service:
    name: docker
    enabled: yes
    state: started
  become: true
